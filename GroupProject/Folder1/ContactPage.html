<html>
	<style>
		* {
			margin: 0;
			padding: 0;
			text-decoration: none;
		}
		
		nav {
			display: flex;
			height: 100px;
			justify-content: space-between;
			background-color: #99602E;
		}
		
		.sidebar {
			display: flex;
			width: 240px;
			min-height: 100vh;
			padding: 20px;
			background-color: #cdb891;
			flex-shrink: 0;
		}
		
		.footer {
			background-color: #99602E;
			color: darkslategray;
			font-size: 15px;
			text-align: center;
			padding: 20px 0;
		}
			
		.footer ul {
			display: flex;
			justify-content: center;
			padding: 0 40px;
			list-style: none;
			align-items: center;
		}
		
		.footer ul li:nth-child(2) {
			margin-left: auto;
		}
		
		.main {
			flex: 1;
			padding: 40px;
			background-color: #F5F5DC;
		}
		
		.content-area {
			display: flex;
			align-items: stretch;
		}
		
		body {
			background-color: #D3D3D3;
		}
		
		.wrapper {
			margin: 0 auto;
			width: 1200px;
			background-color: #fff;
		}
		
		nav ul {
			display: flex;
			width: 100%;
			align-items: center;
			list-style: none;
		}

		nav ul li:nth-child(2) {
			margin-left: auto;
		}

		nav ul li a {
			font-size: 20px;
			color: darkslategray;
			padding: 0 20px;
		}
		
		nav ul li a:hover {
			color: rgb(139, 0, 0);
		}

		nav ul li b {
			font-size: 30px;
			color: black;
			padding-left: 20px;
		}
		
	</style>
	<body>
		<div class="wrapper">
			<nav>
				<img src="../Images/logo.png" alt="potato logo">
				<ul>
					<li><b>Website Name Goes here</b></li>
					<li><a href="HomePage.html">Home</a></li>
					<li><a href="PotatoesPage.html">Varieties of Potatoes</a></li>
					<li><a href="AboutUsPage.html">About Us</a></li>
					<li><a href="ContactPage.html">Contact Information</a></li>
				</ul>
			</nav>
			<div class="content-area">
			<div class="sidebar">
				<h1></h1>
			</div>
			<div class="main">
				<h1>main text here</h1>
			</div>
			</div>
			<div class="footer">
				<ul>
					<li>© 2024 company name goes here. All rights reserved.</li>
					<li><a href="">Terms of Service</a></li>
					<li> | </li>
					<li><a href="">Privacy Policy</a></li>
				</ul>
			</div>
		</div>
	</body>
</html>
