<html>
	<style>
		* {
			margin: 0;
			padding: 0;
			text-decoration: none;
		}
		
		nav {
			display: flex;
			height: 100px;
			justify-content: space-between;
			background-color: #99602E;
		}
		
		body {
			background-color: #D3D3D3;
			background-image: linear-gradient(rgba(128, 128, 128,25%), rgba(128,128,128,20%)), url(../images/field.jpg);
			background-repeat: no-repeat;
			background-size: cover;
		}
		
		.text-container {
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;  
		}
		
		.text {
			margin-bottom: 55%;
			font-size: 30px;
			font-family: arial;
			color: black;
			font-weight: bold;
			text-shadow: 
			1px 1px 0px #919191,
			2px 2px 0px #919191,
			3px 3px 0px #919191,
			4px 4px 0px #919191,
			5px 5px 10px rgba(0,0,0,0.4);
		}
		
		.wrapper-main {
			margin: 0 auto;
			width: 1000px;
		}
		
		ul {
			display: flex;
			width: 100%;
			align-items: center;
			list-style: none;
		}

		ul li:nth-child(2) {
			margin-left: auto;
		}

		ul li a {
			font-size: 20px;
			color: darkslategray;
			padding: 0 20px;
		}
		
		ul li a:hover {
			color: rgb(139, 0, 0);
		}

		ul li b {
			font-size: 30px;
			color: black;
			padding-left: 20px;
		}
	</style>
